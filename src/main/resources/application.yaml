# --- [공통 및 운영 환경 기본 설정] ---
spring:
  application:
    name: multi-currency-ledger-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/ledger_db
    username: ${DB_USER:ledger_admin}
    password: ${DB_PASSWORD:ledger_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[format_sql]": true
        "[default_batch_fetch_size]": 1000
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: info
    "[org.hibernate.SQL]": debug

---
# --- [로컬/개발 환경 전용 설정] ---
spring:
  config:
    activate:
      on-profile: "local"

logging:
  level:
    "[org.hibernate.orm.jdbc.bind]": trace
