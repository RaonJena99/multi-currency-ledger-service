spring:
  application:
    name: multi-currency-ledger-service
  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/ledger_db
    username: ${DB_USER:ledger_admin}
    password: ${DB_PASSWORD:ledger_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: info
    org.hibernate.SQL: debug

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1 # Outer Proxy
    instances:
      pgSettlementApi:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 30
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true

  retry:
    retryAspectOrder: 2 # Inner Proxy
    instances:
      pgSettlementApi:
        maxAttempts: 3 # 최대 3회 시도
        waitDuration: 500ms # 첫 재시도 대기 시간
        enableExponentialBackoff: true # 지수 백오프 활성화
        exponentialBackoffMultiplier: 2 # 점진적 증가
        enableRandomizedWait: true # 트래픽 결집 현상을 방지하는 지터(Jitter) 추가
        randomizedWaitFactor: 0.1
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.RestClientException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException.BadRequest
          - org.springframework.web.client.HttpClientErrorException.Unauthorized

---
spring:
  config:
    activate:
      on-profile: "local"

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace
