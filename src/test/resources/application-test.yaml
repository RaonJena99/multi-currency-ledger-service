spring:
  application:
    name: multi-currency-ledger-test

  datasource:
    url: jdbc:tc:postgresql:15.2:///ledger_test_db
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    root: info
    com.github.raonjena99: debug
