name: Plantuml Architecture Diagram

on:
  push:
    branches: ["main"]
    paths:
      - "src/main/java/**"
      - "build.gradle"
      - ".github/workflows/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-diagram:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Repository 다운로드
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: 2. Java 21 환경 세팅
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: 3. 실행 권한 부여
        run: chmod +x gradlew

      - name: 4. Architecture 생성 (.puml)
        run: ./gradlew generateClassDiagrams

      - name: 2. .puml 내용을 README.md에 삽입
        run: |
          python3 -c '
          import re

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()
              
          with open("docs/architecture/plantuml/full-architecture.puml", "r", encoding="utf-8") as f:
              puml = f.read()

          mermaid = re.sub(r"@startuml.*", "", puml)
          mermaid = re.sub(r"@enduml.*", "", mermaid)

          mermaid = re.sub(r"-\[hidden\]->", "-->", mermaid)
          mermaid = re.sub(r"-\[.*\]->", "-->", mermaid)

          mermaid = re.sub(r"interface\s+(\w+)", r"class \1", mermaid)
          mermaid = re.sub(r"enum\s+(\w+)", r"class \1", mermaid)

          mermaid_block = f"\n<details><summary><b>[클릭하여 전체 아키텍처 다이어그램 보기]</b></summary>\n\n```mermaid\ngraph TD\n{mermaid.strip()}\n```\n</details>\n"

          pattern = r"<!-- START_PUML -->.*?<!-- END_PUML -->"
          if not re.search(pattern, readme, flags=re.DOTALL):
              pattern = r"<!-- START_MERMAID -->.*?<!-- END_MERMAID -->"
              
          new_readme = re.sub(pattern, mermaid_block, readme, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)
          '

      - name: 3. Commit & Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Plantuml 아키텍처 다이어그램 업데이트"
          file_pattern: "README.md"
