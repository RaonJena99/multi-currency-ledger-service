name: JIG Architecture Documentation

on:
  push:
    branches: ["main"]
    paths:
      - "src/main/java/**"
      - "build.gradle"
      - "jig.properties"
      - ".github/workflows/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-jig-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repository 다운로드
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: 2. Java 21 환경 세팅
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: 3. Graphviz 설치
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: 4. 프로젝트 빌드 및 JIG 아키텍처 다이어그램 추출
        run: |
          chmod +x gradlew
          ./gradlew clean classes jigReports --stacktrace

      - name: 5. 생성된 다이어그램 디버깅 및 문서 디렉토리로 이동
        run: |
          echo "=== JIG가 생성한 산출물 목록 확인 ==="
          find build/jig -type f || echo "JIG 디렉토리가 비어 있습니다."

          mkdir -p docs/architecture/jig

          cp -R build/jig/* docs/architecture/jig/ || echo "복사할 파일이 없습니다."

      - name: 6. 변경된 다이어그램 자동 커밋 및 푸시
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add -f docs/architecture/jig/

          git diff --quiet && git diff --staged --quiet || git commit -m "docs: [Auto] JIG 아키텍처 다이어그램 및 리포트 업데이트"

          git push origin HEAD:${{ github.ref_name }}
