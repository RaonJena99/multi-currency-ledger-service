name: Architecture Documentation Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "src/main/java/**"
      - "build.gradle"
      - ".github/workflows/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repository 다운로드
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: 2. Java 21 환경 세팅
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: 3. 실행 권한 부여
        run: chmod +x gradlew

      - name: 4. Spring Modulith 아키텍처 추출 (.puml)
        run: ./gradlew test --tests "*LedgerArchitectureTest*" --stacktrace

      - name: 5. 전체 클래스 다이어그램 추출 (.puml)
        run: ./gradlew generateClassDiagrams

      - name: 6. PUML -> SVG 렌더링 (Docker 권한 이슈 해결)
        run: |
          mkdir -p docs/architecture/modulith

          docker run --rm --user $(id -u):$(id -g) -v ${{ github.workspace }}:/app plantuml/plantuml -tsvg "/app/build/spring-modulith-docs/*.puml"

          shopt -s nullglob
          cp build/spring-modulith-docs/*.svg docs/architecture/modulith/ || true
          cp build/spring-modulith-docs/*.puml docs/architecture/modulith/ || true

      - name: 7. PlantUML -> Mermaid & README 주입
        run: |
          python3 -c '
          import re
          import sys

          with open("docs/architecture/plantuml/full-architecture.puml", "r", encoding="utf-8") as f:
              puml = f.read()

          class_map = {}
          mermaid_lines = ["classDiagram"]
          in_class = False

          for match in re.finditer(r"(?:class|entity|interface|enum|abstract class)\s+\"([^\"]+)\"\s+as\s+([^\s{]+)", puml):
              class_map[match.group(2)] = match.group(1).replace("$", "_")

          for line in puml.split("\n"):
              line = line.strip()
              if not line or line.startswith("@") or line.startswith("!"): continue
              
              match = re.match(r"(class|entity|interface|enum|abstract class)\s+\"[^\"]+\"\s+as\s+([^\s{]+)\s*\{", line)
              if match:
                  type_kw = match.group(1)
                  simple_name = class_map[match.group(2)]
                  mermaid_lines.append(f"  class {simple_name} {{")
                  if type_kw == "interface": mermaid_lines.append("    <<Interface>>")
                  elif type_kw == "enum": mermaid_lines.append("    <<Enumeration>>")
                  elif type_kw == "abstract class": mermaid_lines.append("    <<Abstract>>")
                  in_class = True
                  continue
              
              if in_class and line == "}":
                  mermaid_lines.append("  }")
                  in_class = False
                  continue
              
              if in_class:
                  if line == "__": continue
                  b_line = line.replace("<", "~").replace(">", "~")
                  b_line = b_line.replace("{static}", "").replace("{abstract}", "").strip()
                  mermaid_lines.append(f"    {b_line}")
                  continue
              
              if "-->" in line or "-|>" in line or ".|>" in line or "o--o" in line or "*--*" in line or "--" in line:
                  rel = line
                  for f_name in sorted(class_map.keys(), key=len, reverse=True):
                      if f_name in rel: rel = rel.replace(f_name, class_map[f_name])
                  rel = re.sub(r"-[a-zA-Z]+-\|>", "--|>", rel)
                  rel = re.sub(r"\.[a-zA-Z]+\.\|>", "..|>", rel)
                  rel = re.sub(r"-[a-zA-Z]+->", "-->", rel)
                  rel = rel.replace("o--o", "o--").replace("*--*", "*--")
                  mermaid_lines.append("  " + rel)

          mermaid_code = "\n".join(mermaid_lines)
          mermaid_block = f"\n<details data-auto-diagram=\"true\"><summary><b>[전체 클래스 다이어그램 보기]</b></summary>\n\n```mermaid\n{mermaid_code}\n```\n</details>\n"

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          target_heading = "### 3. Class Diagram"

          if target_heading in readme:
              if "<details data-auto-diagram=\"true\">" in readme:
                  new_readme = re.sub(r"\n<details data-auto-diagram=\"true\">.*?</details>\n", mermaid_block, readme, flags=re.DOTALL)
              else:
                  parts = readme.split(target_heading)
                  new_readme = parts[0] + target_heading + "\n" + mermaid_block + parts[1]
                  
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(new_readme)
          else:
              print(f"::error::README.md 파일에서 타겟 헤딩({target_heading})을 찾을 수 없습니다.")
              sys.exit(1)
          '

      - name: 8. 종합 변경사항 자동 커밋 및 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 아키텍처 다이어그램 및 README 문서 자동 동기화"
          file_pattern: "docs/architecture/modulith/* README.md"
