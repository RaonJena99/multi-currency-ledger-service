name: Modulith Architecture Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  generate-and-commit-diagrams:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 1. Repository 다운로드
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: 2. Java 21 환경 세팅
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: 3. PUML 생성
        run: ./gradlew test --tests "*LedgerArchitectureTest*"

      - name: 4. PUML -> SVG 렌더링 (Docker 사용)
        run: |
          mkdir -p docs/architecture/modulith
          docker run --rm -v ${{ github.workspace }}:/app plantuml/plantuml -tsvg "/app/build/spring-modulith-docs/*.puml"
          cp build/spring-modulith-docs/*.svg docs/architecture/modulith/ || true
          cp build/spring-modulith-docs/*.puml docs/architecture/modulith/ || true

      - name: 5. Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-update modulith architecture diagrams"
          file_pattern: "docs/architecture/*"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
