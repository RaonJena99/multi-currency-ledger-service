# docker-compose.yml
services:
  postgres:
    image: postgres:15-alpine
    container_name: ledger-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ledger_db
      POSTGRES_USER: ledger_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ledger_password}
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_admin -d ledger_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: ledger-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
